name: anotador_mundial
description: "Un anotador para las figuitas del mundial 2026"
publish_to: 'none'
version: 1.0.1+36

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5+1
  google_mobile_ads: ^5.3.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_messaging: ^16.2.2
  flutter_local_notifications: ^17.2.3
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.1
  http: ^1.1.0
  share_plus: ^7.1.0
  path_provider: ^2.1.2
  receive_sharing_intent: ^1.8.1
  shared_preferences: ^2.5.5
  google_fonts: ^8.1.0
  confetti: ^0.7.0
  video_player: ^2.8.2
  cached_network_image: ^3.3.1
  in_app_update: ^4.2.5
  connectivity_plus: ^7.1.1
  flutter_dotenv: ^6.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  google_sign_in_android: 6.1.35

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/pelota.webp
    - assets/messi.png
    - assets/maradona.png
    - assets/kempes.png
    - assets/coca.png
    - assets/Inicio.mp4
